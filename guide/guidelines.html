<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guidelines</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #dff3ff;
      --bg2: #f7fbff;
      --ink: #1f2a37;
      --muted: #4b5563;
      --panel: #ffffff;
      --yellow: #ffe37a;
      --yellow-ink: #3c2f00;
      --line: #c5dfef;
      --audio-bg: #eef8ff;
      --overlay: rgba(19, 31, 45, 0.68);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px 14px 90px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .titlebox h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3.8vw, 2.4rem);
    }

    .titlebox p {
      margin: 6px 0 0;
      font-size: 0.98rem;
      color: var(--muted);
    }

    .return-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.16);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .return-btn {
      background: var(--yellow);
      color: var(--yellow-ink);
    }

    .return-btn:hover,
    .guide-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 7px 18px rgba(0,0,0,0.16);
    }

    .button-area {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 12px;
      padding-top: 6px;
    }

    .guide-btn {
      border: none;
      border-radius: 18px;
      min-height: 54px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: #163047;
      background: var(--panel);
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      white-space: nowrap;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--overlay);
      z-index: 999;
      padding: 16px;
    }

    .overlay.show {
      display: flex;
    }

    .dialog {
      width: min(760px, 96vw);
      min-height: 240px;
      max-height: 88vh;
      overflow: auto;
      background: var(--panel);
      border-radius: 24px;
      padding: 22px 20px 26px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.32);
      position: relative;
    }

    .dialog h2 {
      margin: 0 0 10px;
      font-size: clamp(1.3rem, 3.5vw, 2rem);
      color: #10273c;
    }

    .dialog p {
      margin: 8px 0;
      line-height: 1.45;
      color: #455468;
    }

    .audio-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: var(--audio-bg);
      border: 1px solid var(--line);
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    audio {
      display: none;
    }

    .close-note {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #5f6b7b;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
      color: #7a1d1d;
      min-height: 1.2em;
    }

    @media (max-width: 700px) {
      .page { padding: 14px 10px 80px; }
      .button-area { gap: 10px; }
      .guide-btn {
        min-height: 50px;
        padding: 10px 14px;
        font-size: 0.95rem;
      }
      .dialog {
        padding: 18px 16px 20px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="titlebox">
        <h1>Guidelines</h1>
        <p>Audio-first guide page for PlÃ¡tica.</p>
      </div>
      <button class="return-btn" id="returnToDirector" type="button">Return to Director</button>
    </div>

    <div class="button-area" id="buttonArea"></div>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="dialog" id="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <h2 id="dialogTitle">Guideline</h2>
      <p id="dialogText">Choose a guideline button to hear its audio.</p>

      <div class="audio-box">
        <strong>Audio Guideline</strong>
        <audio id="guideAudio" preload="auto"></audio>
        <div class="status" id="audioStatus"></div>
      </div>

      <p class="close-note">Click outside this white panel to close it.</p>
    </div>
  </div>

  <script>
    // Guidelines page audio logic.
    // This file lives at: guide/guidelines.html
    // Audio files live at: guide/audio/*.m4a
    // Therefore the correct audio path from this page is: ./audio/filename.m4a

    const guidelines = [
      { key: "guide01", title: "How To", audio: "./audio/how_to.m4a" },
      { key: "guide02", title: "Give It A Chance", audio: "./audio/give_chance.m4a" },
      { key: "guide03", title: "Dale Una Oportunidad", audio: "./audio/dale_una_oportunidad.m4a" },
      { key: "guide04", title: "Los Botones", audio: "./audio/the_buttons.m4a" },
      { key: "guide05", title: "El Presente", audio: "./audio/present_tense.m4a" },
      { key: "guide06", title: "PlÃ¡tica", audio: "./audio/chat_only.m4a" },
      { key: "guide07", title: "Tu Tesoro Escondido", audio: "./audio/past_spanish.m4a" },
      { key: "guide08", title: "No TraducciÃ³n", audio: "./audio/notranslating.m4a" },
      { key: "guide09", title: "Los Tres Cuartos", audio: "./audio/three_rooms.m4a" },
      { key: "guide10", title: "La Isla Desierta", audio: "./audio/desert_island.m4a" },
      { key: "guide11", title: "Piensa en EspaÃ±ol", audio: "./audio/thinking_spanish.m4a" },
      { key: "guide12", title: "Ser/Estar", audio: "./audio/to_be.m4a" },
      { key: "guide13", title: "Like y Gustar", audio: "./audio/gustar.m4a" },
      { key: "guide14", title: "Hazle trampa a tu memoria", audio: "./audio/trick_memory.m4a" },
      { key: "guide15", title: "Yo Tener Hambre", audio: "./audio/yo_tener_hambre.m4a" },
      { key: "guide16", title: "El EspaÃ±ol Canta", audio: "./audio/spanish_sings.m4a" }
    ];

    const buttonArea = document.getElementById("buttonArea");
    const overlay = document.getElementById("overlay");
    const dialog = document.getElementById("dialog");
    const dialogTitle = document.getElementById("dialogTitle");
    const dialogText = document.getElementById("dialogText");
    const guideAudio = document.getElementById("guideAudio");
    const audioStatus = document.getElementById("audioStatus");
    const returnToDirector = document.getElementById("returnToDirector");

    let currentAudioPath = "";

    function makeButtonWidth(title) {
      const base = 120;
      const extra = Math.min(title.length * 6.5, 300);
      return Math.round(base + extra);
    }

    function buildButtons() {
      buttonArea.innerHTML = "";

      guidelines.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "guide-btn";
        btn.type = "button";
        btn.textContent = item.title;
        btn.style.width = makeButtonWidth(item.title) + "px";
        btn.dataset.key = item.key;
        btn.dataset.audio = item.audio;
        btn.addEventListener("click", () => openGuideline(item));
        buttonArea.appendChild(btn);
      });
    }

    function resetAudio() {
      try { guideAudio.pause(); } catch(e) {}
      guideAudio.currentTime = 0;
      guideAudio.removeAttribute("src");
      currentAudioPath = "";
      guideAudio.load();
    }

    function openGuideline(item) {
      dialogTitle.textContent = item.title;
      dialogText.textContent = "Playing this guideline now.";
      overlay.classList.add("show");
      overlay.setAttribute("aria-hidden", "false");

      resetAudio();
      currentAudioPath = item.audio;
      guideAudio.src = currentAudioPath;
      guideAudio.load();
      audioStatus.textContent = "Loading: " + currentAudioPath;

      // Because this function is called directly by the user's button click,
      // the browser allows the audio to start without a second Play button.
      playCurrentAudio();
    }

    function closeOverlay() {
      try { guideAudio.pause(); } catch(e) {}
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
    }

    async function playCurrentAudio() {
      if (!currentAudioPath && guideAudio.getAttribute("src")) {
        currentAudioPath = guideAudio.getAttribute("src");
      }

      if (!currentAudioPath) {
        audioStatus.textContent = "No audio source is loaded.";
        return;
      }

      try {
        guideAudio.currentTime = 0;
        await guideAudio.play();
        audioStatus.textContent = "Playing: " + currentAudioPath;
      } catch (err) {
        console.error(err);
        audioStatus.textContent = "Audio did not start. Check the file path or tap the guide button again.";
      }
    }


    guideAudio.addEventListener("play", () => {
      if (currentAudioPath) audioStatus.textContent = "Playing: " + currentAudioPath;
    });

    guideAudio.addEventListener("loadedmetadata", () => {
      if (currentAudioPath) audioStatus.textContent = "Loaded OK: " + currentAudioPath;
    });

    guideAudio.addEventListener("ended", () => {
      if (currentAudioPath) audioStatus.textContent = "Finished: " + currentAudioPath;
    });

    guideAudio.addEventListener("error", () => {
      const err = guideAudio.error;
      audioStatus.textContent = "Audio error. Check that this file exists: " + currentAudioPath + " Code=" + (err ? err.code : "none");
    });

    overlay.addEventListener("click", e => {
      if (e.target === overlay) closeOverlay();
    });

    dialog.addEventListener("click", e => {
      e.stopPropagation();
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && overlay.classList.contains("show")) {
        closeOverlay();
      }
    });

    returnToDirector.addEventListener("click", () => {
      history.back();
    });

    buildButtons();
  </script>
</body>
</html>
