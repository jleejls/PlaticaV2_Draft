<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Gente</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #eef8ff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vh 2vw 11vh;
    }

    /*
      La Gente now owns its own structure.
      It does not borrow the conductor structure and it does not use lesson images.
      It pulls only from the root characters folder:
        ./characters/images/P1.jpg through P9.jpg
        ./characters/audios/1.m4a through 10.m4a
    */

    .gente-stage {
      width: min(96vw, 1050px);
      min-height: min(76vh, 700px);
      display: grid;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      grid-template-rows: repeat(3, minmax(110px, 1fr));
      column-gap: clamp(42px, 12vw, 160px);
      row-gap: clamp(18px, 3vh, 34px);
      align-items: center;
      justify-items: center;
    }

    .person-card {
      width: clamp(105px, 12vw, 150px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .person-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .person-card:focus-visible,
    .person-card.selected {
      outline: 4px solid gold;
      outline-offset: 4px;
      border-radius: 8px;
    }

    .return-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .continue-button {
      pointer-events: auto;
      min-width: 150px;
      min-height: 48px;
      border: 2px solid #1ca53a;
      border-radius: 12px;
      background: #e86f00;
      color: white;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
    }

    .continue-button:active {
      transform: translateY(1px);
    }

    @media (max-width: 700px) {
      body {
        padding: 3vh 1vw 12vh;
      }

      .gente-stage {
        width: 98vw;
        min-height: 72vh;
        grid-template-columns: repeat(3, 1fr);
        column-gap: clamp(8px, 4vw, 22px);
        row-gap: clamp(10px, 2.5vh, 22px);
      }

      .person-card {
        width: clamp(86px, 29vw, 125px);
      }
    }
  </style>
</head>
<body>

  <main id="genteStage" class="gente-stage" aria-label="La Gente"></main>

  <div class="return-bar">
    <button id="continueButton" class="continue-button" type="button">Continuar</button>
  </div>

  <audio id="player" preload="auto"></audio>

  <script>
    const CHARACTER_COUNT = 9;

    function getRootPrefix() {
      const here = window.location.pathname.toLowerCase();

      // Correct normal setup: LaGente.html is in the PV2 root beside characters/.
      // This fallback only protects you if a copy is accidentally placed inside
      // platicadesktop/ or platicaphone/.
      if (here.includes("/platicadesktop/") || here.includes("/platicaphone/")) {
        return "../";
      }

      return "./";
    }

    function getCharacterImagePath(n) {
      return getRootPrefix() + "characters/images/P" + n + ".jpg";
    }

    function getLowercaseFallbackImagePath(n) {
      return getRootPrefix() + "characters/images/p" + n + ".jpg";
    }

    function getCharacterAudioPath(n) {
      return getRootPrefix() + "characters/audios/" + n + ".m4a";
    }

    function buildLaGenteStructure() {
      const stage = document.getElementById("genteStage");
      if (!stage) return;

      stage.innerHTML = "";

      for (let n = 1; n <= CHARACTER_COUNT; n++) {
        const button = document.createElement("button");
        button.className = "person-card";
        button.id = "person" + n;
        button.type = "button";
        button.setAttribute("aria-label", "Persona " + n);
        button.dataset.audioNumber = String(n);

        const img = document.createElement("img");
        img.src = getCharacterImagePath(n);
        img.alt = String(n);

        // GitHub Pages is case-sensitive. The correct requested name is P1.jpg,
        // but this protects local test copies that still use p1.jpg.
        img.onerror = function () {
          const fallback = getLowercaseFallbackImagePath(n);
          if (img.src.endsWith("/p" + n + ".jpg")) return;
          img.src = fallback;
        };

        button.appendChild(img);
        button.addEventListener("click", function () {
          selectPerson(button);
          playAudio(n);
        });

        stage.appendChild(button);
      }
    }

    function selectPerson(button) {
      document.querySelectorAll(".person-card.selected").forEach(function (el) {
        el.classList.remove("selected");
      });
      button.classList.add("selected");
    }

    function playAudio(n) {
      const player = document.getElementById("player");
      if (!player) return Promise.resolve();

      const audioPath = getCharacterAudioPath(n);

      player.pause();
      player.removeAttribute("src");
      player.load();
      player.onerror = function () {
        console.log("Could not load La Gente audio:", audioPath);
      };
      player.src = audioPath;
      player.load();

      return player.play().catch(function (err) {
        console.log("Could not play La Gente audio:", audioPath, err);
      });
    }
  </script>

  <script>
    // Return logic preserved from the earlier La Gente file.
    // The old file already protected against returning to lessonselect.html
    // or accidentally returning a wide desktop view into the phone conductor.
    function getSavedLessonNumber() {
      const params = new URLSearchParams(window.location.search);
      const rawLesson =
        params.get("lesson") ||
        sessionStorage.getItem("lesson") ||
        sessionStorage.getItem("selectedLesson") ||
        sessionStorage.getItem("currentLesson") ||
        localStorage.getItem("lesson") ||
        localStorage.getItem("selectedLesson") ||
        localStorage.getItem("currentLesson") ||
        "1";

      const n = Number(rawLesson);
      return Number.isFinite(n) && n > 0 ? String(n) : "1";
    }

    function isFirstTimeStart(params) {
      return params.get("firstTime") === "1" ||
        params.get("autoStartLevel1") === "1";
    }

    function getLane(params) {
      const here = window.location.pathname.toLowerCase();
      if (here.includes("/platicaphone/")) return "phone";
      if (here.includes("/platicadesktop/")) return "desktop";

      const rawLane =
        params.get("lane") ||
        sessionStorage.getItem("platicaLane") ||
        localStorage.getItem("platicaLane") ||
        sessionStorage.getItem("inglesyaLane") ||
        localStorage.getItem("inglesyaLane") ||
        (window.innerWidth < 700 ? "phone" : "desktop");

      return rawLane === "phone" ? "phone" : "desktop";
    }

    function storeLessonOneForFirstTime(lane) {
      const lesson = "1";

      sessionStorage.removeItem("lagenteReturnHref");
      localStorage.removeItem("lagenteReturnHref");

      sessionStorage.setItem("firstTimeStart", "yes");
      sessionStorage.setItem("autoStartLevel1", "yes");
      sessionStorage.setItem("lesson", lesson);
      sessionStorage.setItem("selectedLesson", lesson);
      sessionStorage.setItem("currentLesson", lesson);
      sessionStorage.setItem("platicaLane", lane);
      sessionStorage.setItem("inglesyaLane", lane);

      localStorage.setItem("firstTimeStart", "yes");
      localStorage.setItem("autoStartLevel1", "yes");
      localStorage.setItem("lesson", lesson);
      localStorage.setItem("selectedLesson", lesson);
      localStorage.setItem("currentLesson", lesson);
      localStorage.setItem("platicaLane", lane);
      localStorage.setItem("inglesyaLane", lane);
    }

    function goToFirstTimeStructure(params) {
      const lane = getLane(params);
      storeLessonOneForFirstTime(lane);

      const structurePath = lane === "phone"
        ? "./platicaphone/structure.html"
        : "./platicadesktop/structure.html";

      window.location.href = structurePath + "?autoStartLevel1=1&lesson=1";
    }

    function hasPhoneLayoutConfig() {
      return !!(
        sessionStorage.getItem("phoneLayoutConfig") ||
        localStorage.getItem("phoneLayoutConfig")
      );
    }

    function isWideDesktopView() {
      return window.innerWidth >= 701;
    }

    function shouldAvoidPhoneConductor() {
      return isWideDesktopView() && !hasPhoneLayoutConfig();
    }

    function cleanBadLaGenteReturnStorage() {
      const keys = ["lagenteReturnHref"];
      for (const key of keys) {
        const s = sessionStorage.getItem(key) || "";
        const l = localStorage.getItem(key) || "";
        const st = s.toLowerCase();
        const lt = l.toLowerCase();
        if (st.includes("lessonselect") || (shouldAvoidPhoneConductor() && st.includes("platicaphone/conductor"))) sessionStorage.removeItem(key);
        if (lt.includes("lessonselect") || (shouldAvoidPhoneConductor() && lt.includes("platicaphone/conductor"))) localStorage.removeItem(key);
      }
    }

    function getGoodReturnUrl(raw) {
      if (!raw) return null;

      try {
        const url = new URL(raw, window.location.href);
        const path = url.pathname.toLowerCase();

        if (path.includes("lagente") || path.includes("lessonselect")) return null;
        if (shouldAvoidPhoneConductor() && path.includes("platicaphone/conductor")) return null;
        if (path.includes("conductor") || path.includes("structure")) return url;

        return null;
      } catch (e) {
        return null;
      }
    }

    function getFallbackConductorPath(lane) {
      const here = window.location.pathname.toLowerCase();

      if (here.includes("/platicaphone/") || here.includes("/platicadesktop/")) {
        return "./conductor.html";
      }

      return lane === "phone"
        ? "./platicaphone/conductor.html"
        : "./platicadesktop/conductor.html";
    }

    function returnToConductor() {
      const params = new URLSearchParams(window.location.search);

      if (isFirstTimeStart(params)) {
        goToFirstTimeStructure(params);
        return;
      }

      cleanBadLaGenteReturnStorage();

      const lesson = getSavedLessonNumber();

      sessionStorage.setItem("lesson", lesson);
      sessionStorage.setItem("selectedLesson", lesson);
      sessionStorage.setItem("currentLesson", lesson);
      localStorage.setItem("lesson", lesson);
      localStorage.setItem("selectedLesson", lesson);
      localStorage.setItem("currentLesson", lesson);

      const returnCandidates = [
        params.get("returnHref"),
        document.referrer,
        sessionStorage.getItem("lagenteReturnHref"),
        localStorage.getItem("lagenteReturnHref")
      ];

      for (const candidate of returnCandidates) {
        const url = getGoodReturnUrl(candidate);
        if (!url) continue;

        url.searchParams.set("lesson", lesson);
        url.searchParams.set("selectedLesson", lesson);
        url.searchParams.set("currentLesson", lesson);
        url.searchParams.set("returnFromLaGente", "1");
        url.searchParams.set("prep", Date.now());
        window.location.href = url.href;
        return;
      }

      let requestedReturn =
        params.get("return") ||
        params.get("lane") ||
        localStorage.getItem("platicaLane") ||
        localStorage.getItem("inglesyaLane") ||
        (window.innerWidth < 700 ? "phone" : "desktop");

      if (requestedReturn === "phone" && shouldAvoidPhoneConductor()) {
        requestedReturn = "desktop";
      }

      const lane = requestedReturn === "phone" ? "phone" : "desktop";
      const conductorPath = getFallbackConductorPath(lane);

      window.location.href =
        conductorPath +
        "?lesson=" + encodeURIComponent(lesson) +
        "&selectedLesson=" + encodeURIComponent(lesson) +
        "&currentLesson=" + encodeURIComponent(lesson) +
        "&returnFromLaGente=1&prep=" + Date.now();
    }
  </script>

  <script>
    buildLaGenteStructure();

    document.getElementById("continueButton").addEventListener("click", function () {
      // Audio 10 is available for the Continuar button if you want it.
      // If it is missing or blocked, the page still returns normally.
      const player = document.getElementById("player");
      const audioPath = getCharacterAudioPath(10);
      let returned = false;

      function goBackOnce() {
        if (returned) return;
        returned = true;
        returnToConductor();
      }

      player.pause();
      player.removeAttribute("src");
      player.load();
      player.src = audioPath;
      player.load();
      player.onended = goBackOnce;
      player.onerror = goBackOnce;

      player.play().then(function () {
        setTimeout(goBackOnce, 1800);
      }).catch(goBackOnce);
    });
  </script>

</body>
</html>
