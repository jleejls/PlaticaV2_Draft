<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plática Desktop Conductor - Fast Clean</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      overflow: hidden;
    }
    #structure {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #board {
      position: absolute;
      left: 0;
      right: 0;
      overflow: hidden;
    }
    .slot {
      position: absolute;
      overflow: hidden;
      background: transparent;
      cursor: pointer;
    }
    .slot.circle { border-radius: 50%; }
    .slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }
    .slot.circle img { border-radius: 50%; }
    .selected { outline-offset: -5px; }

    #pbar {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 4px 6px;
      z-index: 50;
      max-width: 96vw;
      overflow: hidden;
    }
    .buttonz {
      border: 2px solid #4CAF50;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .buttonz img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      pointer-events: none;
    }
    #nivelcircle {
      position: fixed;
      background: white;
      border: 1px solid #ddd;
      border-radius: 18px;
      min-width: 88px;
      min-height: 58px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 7px 10px;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
      z-index: 51;
      user-select: none;
      text-align: center;
      line-height: 1.05;
    }
    .level-label {
      font-size: 0.82rem;
    }
    .level-verb {
      font-size: 1.02rem;
    }

    #creditsOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f0f8ff;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }
    #creditsCard {
      width: min(92vw, 620px);
      max-height: 86vh;
      overflow: auto;
      background: rgba(255,255,255,.94);
      border: 2px solid #4CAF50;
      border-radius: 18px;
      box-shadow: 0 8px 28px rgba(0,0,0,.18);
      padding: 22px 26px;
    }
    #creditsCard h1 {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
    }
    #creditsCard ul {
      display: inline-block;
      margin: 0;
      padding-left: 1.2em;
      text-align: left;
      line-height: 1.55;
      font-size: clamp(1rem, 2.3vw, 1.2rem);
    }


    .contact-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 24px;
    }
    .contact-overlay[hidden] { display: none; }
    .contact-box {
      width: min(92vw, 520px);
      background: white;
      color: black;
      padding: 24px 26px;
      border: 2px solid #4CAF50;
      border-radius: 16px;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
    }
    .contact-box h2 {
      margin: 0 0 12px;
      font-size: clamp(1.35rem, 3vw, 2rem);
    }
    .contact-box p {
      margin: 8px 0;
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      line-height: 1.35;
    }
    .contact-address {
      font-weight: 700;
      margin: 12px 0 16px !important;
      word-break: break-word;
    }
    .contact-box button {
      display: inline-block;
      margin-top: 8px;
      padding: 9px 15px;
      border-radius: 8px;
      border: 1px solid #777;
      background: #f4f4f4;
      color: #111;
      font: 14px Arial, Helvetica, sans-serif;
      cursor: pointer;
    }


    #imageMagnifyOverlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.28);
    }
    #imageMagnifyFrame {
      position: relative;
      max-width: 92vw;
      max-height: 88vh;
      padding: 12px;
      background: rgba(255, 255, 255, 0.96);
      border: 3px solid #4CAF50;
      border-radius: 18px;
      box-shadow: 0 10px 32px rgba(0,0,0,.28);
      cursor: default;
    }
    #imageMagnifyClose {
      position: absolute;
      top: -16px;
      right: -16px;
      width: 38px;
      height: 38px;
      border: 3px solid white;
      border-radius: 50%;
      background: red;
      color: white;
      font-size: 26px;
      font-weight: 700;
      line-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,.35);
      z-index: 9001;
      user-select: none;
    }
    #imageMagnifyClose:hover {
      transform: scale(1.06);
    }
    #imageMagnifyFrame img {
      display: block;
      width: auto;
      height: auto;
      max-width: 88vw;
      max-height: 82vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .donate-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      padding: 24px;
    }
    .donate-overlay[hidden] { display: none; }
    .donate-box {
      width: min(92vw, 540px);
      background: white;
      color: black;
      padding: 24px 26px;
      border: 2px solid #4CAF50;
      border-radius: 16px;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
    }
    .donate-box h2 {
      margin: 0 0 10px;
      font-size: clamp(1.35rem, 3vw, 2rem);
    }
    .donate-box p {
      margin: 8px 0 14px;
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      line-height: 1.35;
    }
    #paypalDonateButtonContainer {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px auto;
    }
    .donate-fallback {
      display: inline-block;
      margin: 6px 8px;
      padding: 9px 13px;
      border-radius: 8px;
      border: 1px solid #777;
      background: #f4f4f4;
      color: #111;
      text-decoration: none;
      font: 14px Arial, Helvetica, sans-serif;
      cursor: pointer;
    }
    .donate-close {
      display: inline-block;
      margin: 6px 8px;
      padding: 9px 13px;
      border-radius: 8px;
      border: 1px solid #777;
      background: #f4f4f4;
      color: #111;
      font: 14px Arial, Helvetica, sans-serif;
      cursor: pointer;
    }


  </style>
</head>
<body>
<script>
(function () {
  let selectedLesson = readStoredLesson();
  let selectedPronounId = null;
  let selectedBox = null;
  let currentAudio = [];
  let creditsTransitionLocked = false;
  let creditsTransitionTimer = null;

  const VERBS = [
    "Tener", "Querer", "Decir", "Estar", "Necesitar",
    "Ir", "Saber", "Venir", "Comer", "Tomar", "Hablar",
    "Ver", "Ser", "Poder", "Vivir", "Haber", "Dar", "Poner",
    "Hacer", "Quedar"
  ];

  function lessonVerb(n) {
    return VERBS[Number(n) - 1] || "";
  }

  function levelBadgeHTML(n) {
    const verb = lessonVerb(n);
    return '<div class="level-label">Level ' + n + '</div>' +
           '<div class="level-verb">' + verb + '</div>';
  }

  const MINIMUM_CREDITS_DELAY_MS = 2000; // Two-second opening delay
  const CREDITS_HTML = `<li><strong>Project Assistant:</strong> AJ Cornell</li>
      <li><strong>Male Voice:</strong> Jimmy Self</li>
      <li><strong>Female Voice:</strong> Reina Maldonado</li>
      <li><strong>Actors:</strong></li>
      <li><strong></strong>-   Jose Garcia</li>
      <li><strong></strong>-   Susana Mejia</li>
      <li><strong></strong>-   Maria Flores</li>
      <li><strong></strong>-   Lucia Garcia</li>
      <li><strong></strong>-   Roberto Gomez</li>
      <li><strong></strong>-   Noel Romero</li>
      <li><strong></strong>-   AJ Cornell</li>`;

  function showCreditsOverlay() {
    const oldOverlay = document.getElementById("creditsOverlay");
    if (oldOverlay) oldOverlay.remove();

    const overlay = document.createElement("div");
    overlay.id = "creditsOverlay";
    overlay.setAttribute("aria-live", "polite");

    const card = document.createElement("div");
    card.id = "creditsCard";
    card.innerHTML = '<h1>Créditos</h1><ul>' + CREDITS_HTML + '</ul>';

    overlay.appendChild(card);
    document.body.appendChild(overlay);
  }

  function hideCreditsOverlay() {
    const overlay = document.getElementById("creditsOverlay");
    if (overlay) overlay.remove();
  }

  function runAfterCredits(callback) {
    if (creditsTransitionLocked) return;

    creditsTransitionLocked = true;
    showCreditsOverlay();
    window.clearTimeout(creditsTransitionTimer);

    creditsTransitionTimer = window.setTimeout(() => {
      hideCreditsOverlay();
      creditsTransitionLocked = false;
      if (typeof callback === "function") callback();
    }, MINIMUM_CREDITS_DELAY_MS);
  }

  function startAfterCredits() {
    runAfterCredits(boot);
  }

  function readStoredLesson() {
    const stored =
      sessionStorage.getItem("selectedLesson") ||
      sessionStorage.getItem("lesson") ||
      sessionStorage.getItem("currentLesson") ||
      "1";
    const n = Number(stored);
    return Number.isFinite(n) && n >= 1 && n <= 20 ? n : 1;
  }

  function saveLesson(n) {
    selectedLesson = n;
    sessionStorage.setItem("level", String(n));
    sessionStorage.setItem("selectedLesson", String(n));
    sessionStorage.setItem("currentLesson", String(n));
    sessionStorage.setItem("platicaMode", "desktop");
    if (!sessionStorage.getItem("tense")) sessionStorage.setItem("tense", "now");
  }

  function go404(reason) {
    try { sessionStorage.setItem("conductorError", reason || "Missing desktop structure data"); } catch(e) {}
    window.location.replace("structure.html");
  }

  function parseStoredJSON(key, fallback) {
    const raw = sessionStorage.getItem(key);
    if (!raw) return fallback;
    try { return JSON.parse(raw); }
    catch (e) { return fallback; }
  }

  function readRequiredDesktopSlots() {
    const slots = parseStoredJSON("desktopSlots", null);

    if (!Array.isArray(slots) || slots.length === 0) {
      go404("Missing or empty sessionStorage key: desktopSlots");
      return null;
    }

    const valid = slots.every(slot => {
      if (!slot || typeof slot !== "object") return false;
      if (slot.group !== "pronouns" && slot.group !== "objects") return false;
      if (slot.role && slot.role !== "pronoun" && slot.role !== "object" && slot.role !== "expression") return false;
      if (!Number.isFinite(Number(slot.id))) return false;
      if (slot.shape === "circle") {
        return Number.isFinite(Number(slot.x)) &&
               Number.isFinite(Number(slot.y)) &&
               Number.isFinite(Number(slot.size));
      }
      return ["x", "y", "w", "h"].every(k => Number.isFinite(Number(slot[k])));
    });

    if (!valid) {
      go404("desktopSlots has an invalid slot structure");
      return null;
    }

    return slots;
  }

  function readRequiredButtons() {
    const buttons = parseStoredJSON("buttonSlots", null);

    if (!Array.isArray(buttons) || buttons.length === 0) {
      go404("Missing or empty sessionStorage key: buttonSlots");
      return null;
    }

    const valid = buttons.every(btn => {
      return btn &&
             typeof btn === "object" &&
             typeof btn.action === "string" &&
             typeof btn.img === "string" &&
             typeof btn.title === "string";
    });

    if (!valid) {
      go404("buttonSlots has an invalid button structure");
      return null;
    }

    return buttons;
  }

  function styleConfig() {
    return parseStoredJSON("desktopStyle", {}) || {};
  }

  function applyDesktopStyle(style) {
    document.body.style.background = style.bodyBackground || "#f0f8ff";

    const structure = document.getElementById("structure");
    const board = document.getElementById("board");
    const pbar = document.getElementById("pbar");
    const nivelcircle = document.getElementById("nivelcircle");

    structure.style.background = style.bodyBackground || "#f0f8ff";

    board.style.top = style.boardTop || "0.5vh";
    board.style.bottom = style.boardBottom || "8.7vh";

    pbar.style.bottom = style.buttonBarBottom || "2vh";
    pbar.style.gap = style.buttonGap || "0.4vw";

    document.querySelectorAll(".buttonz").forEach(btn => {
      btn.style.width = style.buttonWidth || "min(10.5vw, 118px)";
      btn.style.height = style.buttonHeight || "min(5.2vh, 42px)";
      btn.style.minWidth = style.buttonMinWidth || "64px";
      btn.style.minHeight = style.buttonMinHeight || "30px";
      btn.style.background = style.buttonBackground || "#d05000";
    });

    nivelcircle.style.left = "50vw";
nivelcircle.style.right = "auto";
nivelcircle.style.bottom = "11vh";
nivelcircle.style.transform = "translateX(-50%)";
    document.querySelectorAll(".selected").forEach(el => {
      el.style.outline = style.selectedOutline || "5px solid red";
    });
  }

  function jpgOnlyPath(src) {
    let value = String(src || "").replace(/\.(?:p)(?:n)(?:g)(?=([?#]|$))/gi, ".jpg");

    // If structure stored trigger paths as root-level "trigger/...",
    // conductor.html is one folder lower in /platicadesktop/, so step up once.
    if (/^trigger\//i.test(value)) {
      value = "../" + value;
    }

    return value;
  }

  function triggerButtonCandidates(src) {
    const raw = String(src || "").replace(/\\/g, "/");
    const file = raw.split("/").pop() || "";
    const base = (file.split("?")[0].split("#")[0]).replace(/\.[^.]+$/, "");
    const name = base || raw.replace(/\.[^.]+$/, "");
    const roots = ["../trigger", "../../trigger", "trigger"];
    const exts = ["jpg", "png", "jpeg"];
    const list = [];

    // Try the path provided by structure first, after converting png to jpg.
    const direct = jpgOnlyPath(src);
    if (direct) list.push(direct);

    roots.forEach(root => {
      exts.forEach(ext => list.push(root + "/" + name + "." + ext));
    });

    return list.filter((path, index, arr) => path && arr.indexOf(path) === index);
  }

  function setTriggerButtonImage(img, src) {
    const paths = triggerButtonCandidates(src);
    let index = 0;

    img.onerror = () => {
      index += 1;
      if (index < paths.length) {
        img.src = paths[index];
      } else {
        console.warn("Missing trigger button image:", src, paths);
      }
    };

    img.src = paths[index] || "";
  }


  function buildContactOverlay() {
    const overlay = document.createElement("div");
    overlay.id = "contactOverlay";
    overlay.className = "contact-overlay";
    overlay.hidden = true;

    const box = document.createElement("div");
    box.className = "contact-box";
    box.innerHTML =
      '<h2>Contact</h2>' +
      '<p>Spanish Sound Mindset</p>' +
      '<p>You can contact me here:</p>' +
      '<p class="contact-address">spanishsoundbites@gmail.com</p>';

    const close = document.createElement("button");
    close.type = "button";
    close.textContent = "Close";
    close.addEventListener("click", closeContactOverlay);

    box.appendChild(close);
    overlay.appendChild(box);

    overlay.addEventListener("click", ev => {
      if (ev.target === overlay) closeContactOverlay();
    });

    return overlay;
  }

  function openContactOverlay() {
    const overlay = document.getElementById("contactOverlay");
    if (overlay) overlay.hidden = false;
  }

  function closeContactOverlay() {
    const overlay = document.getElementById("contactOverlay");
    if (overlay) overlay.hidden = true;
  }

  const PAYPAL_DONATION_URL = "https://www.paypal.com/donate/?business=584TTG6ZNGVYY&no_recurring=0&item_name=Support+Spanish+Sound+Bites%2C+a+free+Spanish+learning+project.&currency_code=USD";
  const PAYPAL_BUSINESS_ID = "584TTG6ZNGVYY";
  const PAYPAL_DONATION_MESSAGE = "Support Spanish Sound Bites, a free Spanish learning project.";
  let paypalDonateRendered = false;
  let paypalDonateScriptLoading = false;

  function buildDonateOverlay() {
    const overlay = document.createElement("div");
    overlay.id = "donateOverlay";
    overlay.className = "donate-overlay";
    overlay.hidden = true;

    const box = document.createElement("div");
    box.className = "donate-box";
    box.innerHTML =
      '<h2>Donación</h2>' +
      '<p>If Spanish Sound Bites helps you, a small donation helps keep it free.</p>' +
      '<div id="paypalDonateButtonContainer" aria-label="PayPal donate button">Loading PayPal...</div>' +
      '<p style="font-size:.92rem;">PayPal should open as a popup over this page. If your browser blocks it, use the backup link.</p>' +
      '<a class="donate-fallback" href="' + PAYPAL_DONATION_URL + '" target="_blank" rel="noopener">Backup PayPal link</a>';

    const close = document.createElement("button");
    close.type = "button";
    close.className = "donate-close";
    close.textContent = "Close";
    close.addEventListener("click", closeDonateOverlay);

    box.appendChild(close);
    overlay.appendChild(box);

    overlay.addEventListener("click", ev => {
      if (ev.target === overlay) closeDonateOverlay();
    });

    return overlay;
  }

  function ensureDonateOverlay() {
    let overlay = document.getElementById("donateOverlay");
    if (!overlay) {
      overlay = buildDonateOverlay();
      document.body.appendChild(overlay);
    }
    return overlay;
  }

  function loadPayPalDonateSDK(callback) {
    if (window.PayPal && window.PayPal.Donation && window.PayPal.Donation.Button) {
      callback();
      return;
    }

    if (paypalDonateScriptLoading) {
      window.setTimeout(() => loadPayPalDonateSDK(callback), 120);
      return;
    }

    paypalDonateScriptLoading = true;
    const script = document.createElement("script");
    script.src = "https://www.paypalobjects.com/donate/sdk/donate-sdk.js";
    script.charset = "UTF-8";
    script.onload = () => {
      paypalDonateScriptLoading = false;
      callback();
    };
    script.onerror = () => {
      paypalDonateScriptLoading = false;
      const container = document.getElementById("paypalDonateButtonContainer");
      if (container) container.textContent = "PayPal could not load. Please use the backup link.";
    };
    document.head.appendChild(script);
  }

  function renderPayPalDonateButton() {
    if (paypalDonateRendered) return;

    const container = document.getElementById("paypalDonateButtonContainer");
    if (!container) return;

    container.textContent = "";

    try {
      PayPal.Donation.Button({
        env: "production",
        business: PAYPAL_BUSINESS_ID,
        item_name: PAYPAL_DONATION_MESSAGE,
        currency_code: "USD",
        image: {
          src: "https://www.paypalobjects.com/en_US/i/btn/btn_donateCC_LG.gif",
          title: "PayPal - The safer, easier way to pay online!",
          alt: "Donate with PayPal button"
        },
        onComplete: function () {
          closeDonateOverlay();
        }
      }).render("#paypalDonateButtonContainer");

      paypalDonateRendered = true;
    } catch (err) {
      console.warn("PayPal Donate SDK render failed:", err);
      container.textContent = "PayPal could not start. Please use the backup link.";
    }
  }

  function openDonateOverlay() {
    stopAllAudio();
    const overlay = ensureDonateOverlay();
    overlay.hidden = false;
    loadPayPalDonateSDK(renderPayPalDonateButton);
  }

  function closeDonateOverlay() {
    const overlay = document.getElementById("donateOverlay");
    if (overlay) overlay.hidden = true;
  }


  function buildShell(slots, buttons) {
    document.body.innerHTML = "";

    const structure = document.createElement("div");
    structure.id = "structure";

    const board = document.createElement("div");
    board.id = "board";
    structure.appendChild(board);

    slots.forEach(slot => {
      const box = document.createElement("div");
      box.className = "slot" + (slot.shape === "circle" ? " circle" : "");
      box.dataset.group = slot.group;
      box.dataset.id = String(slot.id);
      box.dataset.role = slot.role || (slot.group === "pronouns" ? "pronoun" : "object");
      box.style.left = Number(slot.x) + "%";
      box.style.top = Number(slot.y) + "%";

      if (slot.shape === "circle") {
        const size = Number(slot.size);
        box.style.width = size + "px";
        box.style.height = size + "px";
      } else {
        box.style.width = Number(slot.w) + "%";
        box.style.height = Number(slot.h) + "%";
      }

      const img = document.createElement("img");
      img.alt = (slot.role || slot.group) + " " + slot.id;
      img.loading = "eager";
      img.decoding = "async";
      img.fetchPriority = "high";
      box.appendChild(img);
      board.appendChild(box);
    });

    const pbar = document.createElement("div");
    pbar.id = "pbar";

    buttons.forEach(btn => {
      const b = document.createElement("div");
      b.className = "buttonz";
      b.dataset.btn = btn.action;
      b.title = btn.title;

      const img = document.createElement("img");
      img.alt = btn.alt || btn.title;
      setTriggerButtonImage(img, btn.img);
      b.appendChild(img);
      pbar.appendChild(b);
    });

    const nivelcircle = document.createElement("div");
    nivelcircle.id = "nivelcircle";
    nivelcircle.innerHTML = levelBadgeHTML(selectedLesson);

    document.body.appendChild(structure);
    document.body.appendChild(pbar);
    document.body.appendChild(nivelcircle);
    document.body.appendChild(buildContactOverlay());
  }

  function lessonRoot() {
    return "../group/lesson" + selectedLesson;
  }

  function uniquePaths(paths) {
    return paths.filter((path, index, arr) => path && arr.indexOf(path) === index);
  }

  function imageExtensions(path) {
    const value = String(path || "");
    if (!value) return [];

    return uniquePaths([
      value,
      value.replace(/\.jpg(?=([?#]|$))/i, ".jpeg"),
      value.replace(/\.jpg(?=([?#]|$))/i, ".png")
    ]);
  }

  function imageRoots() {
    // Desktop conductor lives in /platicadesktop/.
    // Audio already proves ../group/lessonN is the correct main road.
    // The two extra roots match the proven phone conductor's safety routes.
    return uniquePaths([
      lessonRoot(),
      "../../group/lesson" + selectedLesson,
      "group/lesson" + selectedLesson
    ]);
  }

  function imagePathCandidates(group, id) {
    const n = Number(id);
    const paths = [];

    imageRoots().forEach(root => {
      let baseCandidates = [];

      if (group === "pronouns") {
        baseCandidates = [
          root + "/pronouns/images/p" + n + ".jpg",
          root + "/pronouns/images/img_" + n + ".jpg",
          root + "/pronouns/image/p" + n + ".jpg",
          root + "/image/p" + (n + 10) + ".jpg",
          root + "/image/p" + n + ".jpg"
        ];
      } else if (group === "objects") {
        baseCandidates = [
          root + "/objects/images/p" + n + ".jpg",
          root + "/objects/images/img_" + n + ".jpg",
          root + "/objects/image/p" + n + ".jpg",
          root + "/objects/image/o" + n + ".jpg",
          root + "/image/p" + n + ".jpg",
          root + "/image/o" + n + ".jpg",
          root + "/image/p" + (n + 9) + ".jpg",
          root + "/image/p" + (n + 10) + ".jpg"
        ];
      } else {
        baseCandidates = [
          root + "/" + group + "/images/p" + n + ".jpg",
          root + "/" + group + "/image/p" + n + ".jpg",
          root + "/image/p" + n + ".jpg"
        ];
      }

      baseCandidates.forEach(path => {
        paths.push(...imageExtensions(path));
      });
    });

    return uniquePaths(paths);
  }

  function setImageFromCandidates(img, candidates, label) {
    const sources = Array.isArray(candidates) ? candidates : [candidates];
    let index = 0;

    img.onerror = () => {
      index += 1;
      if (index < sources.length) {
        img.src = sources[index];
      } else {
        console.warn("Missing lesson image:", label || img.alt, sources);
      }
    };

    if (sources.length && img.getAttribute("src") !== sources[0]) {
      img.src = sources[0];
    }
  }

  function audioPath(group, id) {
    return lessonRoot() + "/" + group + "/audios/a" + id + ".m4a";
  }

  function translationPath() {
    return "../translation/" + selectedLesson + ".m4a";
  }

  function stopAllAudio() {
    currentAudio.forEach(a => {
      try { a.pause(); a.currentTime = 0; } catch(e) {}
    });
    currentAudio = [];
  }

  function makeAudio(src) {
    const a = new Audio(src);
    currentAudio.push(a);
    a.addEventListener("ended", () => {
      currentAudio = currentAudio.filter(x => x !== a);
    });
    return a;
  }

  function playOne(src) {
    stopAllAudio();
    const a = makeAudio(src);
    a.play().catch(() => {});
  }

  function playChain(firstSrc, secondSrc) {
    stopAllAudio();
    const a = makeAudio(firstSrc);
    a.addEventListener("ended", () => {
      const b = makeAudio(secondSrc);
      b.play().catch(() => {});
    }, { once: true });
    a.play().catch(() => {
      const b = makeAudio(secondSrc);
      b.play().catch(() => {});
    });
  }

  function clearSelection() {
    selectedPronounId = null;
    if (selectedBox) {
      selectedBox.classList.remove("selected");
      selectedBox.style.outline = "";
    }
    selectedBox = null;
  }

  function selectPronoun(box, id) {
    if (selectedBox) {
      selectedBox.classList.remove("selected");
      selectedBox.style.outline = "";
    }
    selectedPronounId = id;
    selectedBox = box;
    box.classList.add("selected");
    box.style.outline = (styleConfig().selectedOutline || "5px solid red");
  }

  function fillLessonImages() {
    selectedLesson = readStoredLesson();

    const nivelcircle = document.getElementById("nivelcircle");
    if (nivelcircle) nivelcircle.innerHTML = levelBadgeHTML(selectedLesson);

    clearSelection();

    document.querySelectorAll(".slot").forEach(box => {
      const group = box.dataset.group;
      const id = Number(box.dataset.id);
      const img = box.querySelector("img");
      if (img) setImageFromCandidates(img, imagePathCandidates(group, id), group + " " + id);
    });
  }

  function attachSlotBehavior() {
    document.querySelectorAll(".slot").forEach(box => {
      box.addEventListener("contextmenu", ev => {
        ev.preventDefault();
        ev.stopPropagation();

        const img = box.querySelector("img");
        if (img && img.src) openImageMagnifier(img.src, img.alt);
      });

      box.addEventListener("click", () => {
        const group = box.dataset.group;
        const role = box.dataset.role;
        const id = Number(box.dataset.id);

        if (group === "pronouns" && role === "expression") {
          clearSelection();
          playOne(audioPath("pronouns", id));
          return;
        }

        if (group === "pronouns") {
          selectPronoun(box, id);
          playOne(audioPath("pronouns", id));
          return;
        }

        if (group === "objects") {
          if (selectedPronounId) {
            playChain(audioPath("pronouns", selectedPronounId), audioPath("objects", id));
            clearSelection();
          } else {
            playOne(audioPath("objects", id));
          }
        }
      });
    });
  }


  function closeImageMagnifier() {
    const overlay = document.getElementById("imageMagnifyOverlay");
    if (overlay) overlay.remove();
  }

  function openImageMagnifier(src, alt) {
    closeImageMagnifier();

    const overlay = document.createElement("div");
    overlay.id = "imageMagnifyOverlay";

    const frame = document.createElement("div");
    frame.id = "imageMagnifyFrame";

    const closeBtn = document.createElement("button");
    closeBtn.id = "imageMagnifyClose";
    closeBtn.type = "button";
    closeBtn.title = "Cerrar imagen ampliada";
    closeBtn.setAttribute("aria-label", "Cerrar imagen ampliada");
    closeBtn.textContent = "×";

    const img = document.createElement("img");
    img.src = src;
    img.alt = alt || "Imagen ampliada";

    frame.appendChild(closeBtn);
    frame.appendChild(img);
    overlay.appendChild(frame);
    document.body.appendChild(overlay);

    overlay.addEventListener("click", ev => {
      ev.preventDefault();
      ev.stopPropagation();
    });

    overlay.addEventListener("contextmenu", ev => {
      ev.preventDefault();
      ev.stopPropagation();
    });

    frame.addEventListener("click", ev => {
      ev.preventDefault();
      ev.stopPropagation();
    });

    frame.addEventListener("contextmenu", ev => {
      ev.preventDefault();
      ev.stopPropagation();
    });

    closeBtn.addEventListener("click", ev => {
      ev.preventDefault();
      ev.stopPropagation();
      closeImageMagnifier();
    });
  }

  function goLessonSelect() {
    stopAllAudio();
    window.location.href = "lessonselect.html";
  }

  function exitProgram() {
    stopAllAudio();
    window.location.href = "../stop.html";
  }

  function nudgeChip() {
    const nivelcircle = document.getElementById("nivelcircle");
    if (!nivelcircle) return;

    try {
      nivelcircle.animate(
        [{ transform: "scale(1)" }, { transform: "scale(1.06)" }, { transform: "scale(1)" }],
        { duration: 320, easing: "ease-out" }
      );
    } catch(e) {}
  }


  function guidePath() {
    const path = window.location.pathname.replace(/\\/g, "/");

    // If this conductor is inside platicadesktop or platicaphone,
    // the guide folder should be one level up.
    if (/(^|\/)(platicadesktop|platicaphone)\//i.test(path)) {
      return "../guide/guidelines.html";
    }

    // If this conductor is being run from the repository root,
    // the guide folder should be directly beside it.
    return "guide/guidelines.html";
  }

  function openGuide() {
    stopAllAudio();
    window.location.href = guidePath();
  }

  function attachButtonBehavior() {
    document.addEventListener("click", ev => {
      const btn = ev.target.closest && ev.target.closest(".buttonz");
      if (!btn) return;

      const action = btn.dataset.btn;

      if (action === "continue") {
        if (creditsTransitionLocked) return;

        if (selectedLesson < 20) {
          saveLesson(selectedLesson + 1);
          stopAllAudio();
          fillLessonImages();
          nudgeChip();
        } else {
          nudgeChip();
        }
        return;
      }

      if (action === "exit") return exitProgram();
      if (action === "choosel") return goLessonSelect();
      if (action === "translate") return playOne(translationPath());

      if (action === "goback") {
        window.location.href = "../lagente.html";
        return;
      }

      if (action === "email") {
        openContactOverlay();
        return;
      }

      if (action === "help") return openGuide();
      if (action === "donate") return openDonateOverlay();
    }, false);
  }

  function boot() {
    const slots = readRequiredDesktopSlots();
    const buttons = readRequiredButtons();
    if (!slots || !buttons) return;

    buildShell(slots, buttons);
    applyDesktopStyle(styleConfig());
    fillLessonImages();
    attachSlotBehavior();
    attachButtonBehavior();
  }

  window.addEventListener("pagehide", stopAllAudio);
  window.addEventListener("beforeunload", stopAllAudio);

  startAfterCredits();
})();
</script>
</body>
</html>
