<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plática Level Select</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #dff7ff 0%, #f8f0d8 100%);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .lesson-page {
    width: 94%;
    max-width: 900px;
    padding: 22px;
    text-align: center;
  }

  .title-card {
    background: rgba(255, 255, 255, 0.78);
    border-radius: 22px;
    padding: 16px 14px;
    margin-bottom: 18px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.16);
  }

  h1 {
    margin: 0 0 8px 0;
    font-size: 2.1rem;
    letter-spacing: 0.5px;
  }

  .subtitle {
    font-size: 1.05rem;
    opacity: 0.85;
  }

  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .lesson-button {
    border: none;
    border-radius: 20px;
    padding: 19px 10px;
    font-size: 1.18rem;
    font-weight: bold;
    background: rgba(255, 255, 255, 0.92);
    cursor: pointer;
    box-shadow: 0 5px 12px rgba(0,0,0,0.18);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }


  .level-number {
    display: block;
    line-height: 1.05;
  }

  .verb-name {
    display: block;
    margin-top: 4px;
    font-size: 0.9em;
    line-height: 1.05;
  }

  .lesson-button:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 7px 16px rgba(0,0,0,0.22);
  }

  .lesson-button:active {
    transform: scale(0.98);
  }

  @media (max-width: 700px) {
    body {
      align-items: flex-start;
    }

    .lesson-page {
      width: 96%;
      padding: 14px 10px;
    }

    .title-card {
      padding: 12px 10px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.55rem;
    }

    .subtitle {
      font-size: 0.95rem;
    }

    .lesson-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .lesson-button {
      padding: 14px 8px;
      font-size: 1rem;
      border-radius: 16px;
    }
  }

  @media (max-height: 720px) and (max-width: 700px) {
    .lesson-button {
      padding: 11px 8px;
      font-size: 0.96rem;
    }

    h1 {
      font-size: 1.38rem;
    }

    .subtitle {
      display: none;
    }
  }
</style>
</head>

<body>

<div class="lesson-page">
  <div class="lesson-grid">
    <button class="lesson-button" onclick="goToLesson(1)"><span class="level-number">Level 1</span><span class="verb-name">Tener</span></button>
    <button class="lesson-button" onclick="goToLesson(2)"><span class="level-number">Level 2</span><span class="verb-name">Querer</span></button>
    <button class="lesson-button" onclick="goToLesson(3)"><span class="level-number">Level 3</span><span class="verb-name">Decir</span></button>
    <button class="lesson-button" onclick="goToLesson(4)"><span class="level-number">Level 4</span><span class="verb-name">Estar</span></button>

    <button class="lesson-button" onclick="goToLesson(5)"><span class="level-number">Level 5</span><span class="verb-name">Necesitar</span></button>
    <button class="lesson-button" onclick="goToLesson(6)"><span class="level-number">Level 6</span><span class="verb-name">Ir</span></button>
    <button class="lesson-button" onclick="goToLesson(7)"><span class="level-number">Level 7</span><span class="verb-name">Saber</span></button>
    <button class="lesson-button" onclick="goToLesson(8)"><span class="level-number">Level 8</span><span class="verb-name">Venir</span></button>

    <button class="lesson-button" onclick="goToLesson(9)"><span class="level-number">Level 9</span><span class="verb-name">Comer</span></button>
    <button class="lesson-button" onclick="goToLesson(10)"><span class="level-number">Level 10</span><span class="verb-name">Tomar</span></button>
    <button class="lesson-button" onclick="goToLesson(11)"><span class="level-number">Level 11</span><span class="verb-name">Hablar</span></button>
    <button class="lesson-button" onclick="goToLesson(12)"><span class="level-number">Level 12</span><span class="verb-name">Ver</span></button>

    <button class="lesson-button" onclick="goToLesson(13)"><span class="level-number">Level 13</span><span class="verb-name">Ser</span></button>
    <button class="lesson-button" onclick="goToLesson(14)"><span class="level-number">Level 14</span><span class="verb-name">Poder</span></button>
    <button class="lesson-button" onclick="goToLesson(15)"><span class="level-number">Level 15</span><span class="verb-name">Vivir</span></button>
    <button class="lesson-button" onclick="goToLesson(16)"><span class="level-number">Level 16</span><span class="verb-name">Haber</span></button>

    <button class="lesson-button" onclick="goToLesson(17)"><span class="level-number">Level 17</span><span class="verb-name">Dar</span></button>
    <button class="lesson-button" onclick="goToLesson(18)"><span class="level-number">Level 18</span><span class="verb-name">Poner</span></button>
    <button class="lesson-button" onclick="goToLesson(19)"><span class="level-number">Level 19</span><span class="verb-name">Hacer</span></button>
    <button class="lesson-button" onclick="goToLesson(20)"><span class="level-number">Level 20</span><span class="verb-name">Quedar</span></button>
  </div>
</div>

<script>
  function goToLesson(levelNumber) {
    const level = String(levelNumber);

    // Level select must ONLY select the level.
    // Keep these "lesson" keys for conductor compatibility.
    // They are internal routing/storage names, not screen wording.
    sessionStorage.setItem("selectedLesson", level);
    sessionStorage.setItem("lesson", level);
    sessionStorage.setItem("currentLesson", level);

    sessionStorage.setItem("selectedNivel", level);
    sessionStorage.setItem("nivel", level);
    sessionStorage.setItem("currentNivel", level);
    sessionStorage.setItem("platicaMode", "phone");
    sessionStorage.setItem("phoneMode", "1");

    if (!sessionStorage.getItem("tense")) {
      sessionStorage.setItem("tense", "now");
    }

    window.location.href = "conductor.html?direct=1&lesson=" + encodeURIComponent(level) + "&prep=" + Date.now();
  }
</script>

</body>
</html>
