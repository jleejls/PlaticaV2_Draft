<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Plática</title>
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#57ecf6;color:#222;}
    body{display:flex;align-items:center;justify-content:center;padding:18px;}
    .card{width:min(92vw,430px);background:tan;border-radius:16px;padding:18px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.25);}
    h1{font-size:clamp(1.45rem,7vw,2rem);margin:.2rem 0 .75rem;}
    p{font-size:clamp(1rem,4.5vw,1.2rem);line-height:1.35;margin:.6rem 0 1rem;}
    button{min-height:52px;width:100%;border:0;border-radius:12px;background:#007acc;color:white;font-size:1.15rem;font-weight:700;cursor:pointer;}
    button:active{transform:translateY(1px);}
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome to Plática</h1>
    <p>Start with Level 1. For instructions, use button number 4 inside the program.</p>
    <button type="button" onclick="startLevelOne()">Start Level 1</button>
  </main>

  <script>
    function startLevelOne(){
      sessionStorage.setItem('phoneMode','1');
      sessionStorage.removeItem('desktopMode');
      sessionStorage.setItem('lesson','1');
      sessionStorage.setItem('selectedLesson','1');
      sessionStorage.setItem('currentLesson','1');
      sessionStorage.setItem('platicaLane','phone');
      window.location.href = './platicaphone/structure.html?autoStartLevel1=1&lesson=1';
    }
  </script>
</body>
</html>
